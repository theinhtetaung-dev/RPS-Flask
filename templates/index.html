<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors · AI Vision Game</title>
  <meta name="description" content="Play Rock Paper Scissors against AI using your webcam and hand gestures." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ────────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080a18;
      --card:     #10132a;
      --card2:    #181b38;
      --border:   #252850;
      --accent:   #7c6ef5;
      --aglow:    rgba(124,110,245,.28);
      --green:    #4ade80;
      --red:      #f87171;
      --gold:     #f5c76e;
      --txt:      #eef0ff;
      --muted:    #6b71a0;
      --r:        12px;
      --rs:       8px;
      --font:     'Outfit', sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;       /* ← single page, NO scroll */
      background: var(--bg);
      color: var(--txt);
      font-family: var(--font);
    }

    /* animated dot-grid backdrop */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(circle, rgba(124,110,245,.18) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── Shell: header + game-area + footer stacked to 100vh ──────────────── */
    .shell {
      position: relative; z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: 52px 1fr 28px;
      padding: 8px 12px;
      gap: 8px;
    }

    /* ════════════════════════════ HEADER ══════════════════════════════════════ */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon { font-size: 1.4rem; line-height: 1; }
    .logo-text {
      font-size: 1.1rem; font-weight: 800;
      background: linear-gradient(120deg, #fff 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .scores {
      display: flex; gap: 6px;
    }
    .sc {
      display: flex; align-items: center; gap: 5px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 12px;
      font-size: 0.78rem; font-weight: 700;
    }
    .sc .l { color: var(--muted); font-weight: 400; font-size: .72rem; }
    .sc.w .v { color: var(--green); }
    .sc.d .v { color: var(--gold); }
    .sc.lo .v { color: var(--red); }

    /* ════════════════════════════ GAME AREA ═══════════════════════════════════ */
    .game-area {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 10px;
      min-height: 0;           /* allow grid row to shrink */
    }

    /* ── Left column ─────────────────────────────────────────────────────────── */
    .left-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    /* Video wrapper fills remaining height */
    .video-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      border-radius: var(--r);
      overflow: hidden;
      border: 1px solid var(--border);
      background: #06071a;
      box-shadow: 0 0 0 1px rgba(124,110,245,.12), 0 8px 30px rgba(0,0,0,.5);
    }

    #video-feed {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* LIVE badge */
    .live {
      position: absolute; top: 10px; right: 12px;
      display: flex; align-items: center; gap: 5px;
      background: rgba(8,10,24,.72);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(6px);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 0.62rem; font-weight: 700; letter-spacing: .1em;
      color: #ff4f4f;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ff4f4f;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* Player gesture pill (bottom center of video) */
    .gesture-pill {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 7px;
      background: rgba(8,10,24,.78);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 18px;
      font-size: 0.88rem; font-weight: 700;
      white-space: nowrap;
    }
    .gesture-pill .pe { font-size: 1.1rem; }

    /* Hint chips row */
    .hint-row {
      display: flex; gap: 6px; flex-shrink: 0;
    }
    .chip {
      flex: 1;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      padding: 5px 6px;
      text-align: center;
      font-size: 0.7rem;
      display: flex; flex-direction: column; align-items: center; gap: 1px;
    }
    .chip .ce { font-size: 1.05rem; }
    .chip .cn { font-weight: 700; color: var(--txt); }
    .chip .ck { color: var(--muted); font-size: 0.62rem; }

    /* ── Right column (Panel) ──────────────────────────────────────────────── */
    .panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    /* ── AI Card ───────────────────────────────────────────────────────────── */
    .ai-card {
      flex: 1;
      min-height: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .ai-card::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 0%, rgba(124,110,245,.18), transparent 65%);
    }

    .ai-lbl {
      font-size: 0.62rem; text-transform: uppercase;
      letter-spacing: .13em; color: var(--muted); font-weight: 700;
    }

    .ai-em {
      font-size: 4.2rem; line-height: 1;
      display: block;
    }
    .ai-em.pop {
      animation: popIn .38s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(.2) rotate(-25deg); opacity: 0; }
      to   { transform: scale(1)  rotate(0deg);   opacity: 1; }
    }

    .ai-nm {
      font-size: 1.35rem; font-weight: 800; min-height: 1.5rem;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    /* dot-pulse thinking indicator */
    .dots span {
      display: inline-block;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      animation: bounce 1s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,80%,100%{ transform: scale(.65); opacity:.4; }
      40%        { transform: scale(1);   opacity:1;  }
    }

    /* ── Result Banner ─────────────────────────────────────────────────────── */
    .banner {
      flex-shrink: 0;
      border-radius: var(--rs);
      padding: 11px 10px;
      text-align: center;
      font-size: 1.45rem; font-weight: 900;
      letter-spacing: .05em;
      border: 2px solid transparent;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      min-height: 52px;
    }
    .banner.idle  { background: var(--card2); border-color: var(--border); color: var(--muted); font-size: .78rem; font-weight: 400; }
    .banner.cd    { background: rgba(124,110,245,.12); border-color: var(--accent); color: var(--accent); font-size: 2rem; font-weight: 900; animation: pulse .45s ease-out; }
    .banner.win   { background: rgba(74,222,128,.1);   border-color: var(--green); color: var(--green); }
    .banner.lose  { background: rgba(248,113,113,.1);  border-color: var(--red);   color: var(--red);   }
    .banner.draw  { background: rgba(245,199,110,.1);  border-color: var(--gold);  color: var(--gold);  }
    .banner.err   { background: rgba(248,113,113,.08); border-color: var(--red);   color: var(--red); font-size: .82rem; font-weight: 600; }

    @keyframes pulse {
      0%  { transform: scale(1.2); opacity: .5; }
      100%{ transform: scale(1);   opacity: 1;  }
    }
    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      20%    { transform: translateX(-5px); }
      40%    { transform: translateX(5px); }
      60%    { transform: translateX(-3px); }
      80%    { transform: translateX(3px); }
    }
    .shake { animation: shake .38s ease-in-out; }

    /* ── Play Button ───────────────────────────────────────────────────────── */
    .play-btn {
      flex-shrink: 0;
      width: 100%; padding: 13px;
      border: none; border-radius: var(--rs);
      font-family: var(--font); font-size: .95rem; font-weight: 800;
      letter-spacing: .06em; cursor: pointer;
      background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
      color: #fff;
      box-shadow: 0 4px 18px var(--aglow);
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    .play-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 26px var(--aglow); }
    .play-btn:active:not(:disabled){ transform: translateY(0); }
    .play-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ════════════════════════════ FOOTER ══════════════════════════════════════ */
    footer {
      display: flex; align-items: center; justify-content: center;
      gap: 12px;
      font-size: 0.64rem; color: var(--muted); opacity: .7;
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- ════ HEADER ═══════════════════════════════════════════════════════════ -->
  <header>
    <div class="logo">
      <span class="logo-icon">🖐</span>
      <span class="logo-text">Rock · Paper · Scissors</span>
    </div>

    <div class="scores">
      <div class="sc w"><span class="l">WIN</span><span class="v" id="sw">0</span></div>
      <div class="sc d"><span class="l">DRAW</span><span class="v" id="sd">0</span></div>
      <div class="sc lo"><span class="l">LOSE</span><span class="v" id="sl">0</span></div>
    </div>
  </header>

  <!-- ════ GAME AREA ════════════════════════════════════════════════════════ -->
  <div class="game-area">

    <!-- LEFT: webcam -->
    <div class="left-col">

      <div class="video-wrap">
        <div class="live"><div class="live-dot"></div>LIVE</div>

        <img id="video-feed"
             src="{{ url_for('video_feed') }}"
             alt="Live webcam with hand landmark overlay" />

        <div class="gesture-pill">
          <span class="pe" id="p-emoji">🤚</span>
          <span id="p-label">Show your hand…</span>
        </div>
      </div>

      <!-- hint chips -->
      <div class="hint-row">
        <div class="chip"><span class="ce">✊</span><span class="cn">Rock</span><span class="ck">All fingers closed</span></div>
        <div class="chip"><span class="ce">✌️</span><span class="cn">Scissors</span><span class="ck">2 fingers open</span></div>
        <div class="chip"><span class="ce">✋</span><span class="cn">Paper</span><span class="ck">All 5 open</span></div>
      </div>

    </div><!-- /left-col -->

    <!-- RIGHT: game panel -->
    <div class="panel">

      <!-- AI Choice -->
      <div class="ai-card" id="ai-card">
        <div class="ai-lbl">🤖 &nbsp;AI's Choice</div>
        <span class="ai-em" id="ai-em">🤔</span>
        <div class="ai-nm" id="ai-nm">
          <span id="ai-txt">Waiting…</span>
          <div class="dots" id="ai-dots" style="display:none">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Result -->
      <div class="banner idle" id="banner">Press Play to start</div>

      <!-- CTA -->
      <button class="play-btn" id="play-btn" onclick="startRound()">
        ▶ &nbsp;Play Now
      </button>

    </div><!-- /panel -->

  </div><!-- /game-area -->

  <!-- ════ FOOTER ═══════════════════════════════════════════════════════════ -->
  <footer>
    <span>Hold your gesture steady when GO! appears</span>
    <span>·</span>
    <span>Flask · MediaPipe · OpenCV</span>
  </footer>

</div><!-- /shell -->

<script>
  /* ── Score state ─────────────────────────────────────────────────────────── */
  const score = { win: 0, draw: 0, lose: 0 };

  function addScore(r) {
    if (r === 'WIN')  { score.win++;  document.getElementById('sw').textContent = score.win;  }
    if (r === 'DRAW') { score.draw++; document.getElementById('sd').textContent = score.draw; }
    if (r === 'LOSE') { score.lose++; document.getElementById('sl').textContent = score.lose; }
  }

  /* ── Gesture polling (every 300 ms) ─────────────────────────────────────── */
  const G_EMOJI = { Rock:'✊', Scissors:'✌️', Paper:'✋', 'No Hand':'🤚', Unknown:'❓' };

  setInterval(async () => {
    try {
      const { gesture } = await (await fetch('/current_gesture')).json();
      document.getElementById('p-emoji').textContent = G_EMOJI[gesture] ?? '🤚';
      document.getElementById('p-label').textContent =
        (gesture === 'No Hand' || gesture === 'Unknown') ? 'Show your hand…' : gesture;
    } catch (_) {}
  }, 300);

  /* ── Helpers ─────────────────────────────────────────────────────────────── */
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function setBanner(cls, text) {
    const b = document.getElementById('banner');
    b.className = '';            // strip classes → reflow → re-add (re-triggers animation)
    void b.offsetWidth;
    b.className = `banner ${cls}`;
    b.textContent = text;
  }

  /* ── Game round ──────────────────────────────────────────────────────────── */
  let busy = false;

  async function startRound() {
    if (busy) return;
    busy = true;

    const btn   = document.getElementById('play-btn');
    const aiEm  = document.getElementById('ai-em');
    const aiTxt = document.getElementById('ai-txt');
    const aiDot = document.getElementById('ai-dots');

    btn.disabled = true;

    /* reset AI panel */
    aiEm.className  = 'ai-em';
    aiEm.textContent = '🤔';
    aiTxt.textContent = '';
    aiDot.style.display = 'flex';
    setBanner('idle', '');

    /* ── countdown ──────────────────────────────────────────────────────────── */
    for (const step of ['3', '2', '1', '✋  GO!']) {
      setBanner('cd', step);
      await sleep(820);
    }

    /* ── call /resolve ───────────────────────────────────────────────────────── */
    try {
      const res = await fetch('/resolve');

      aiDot.style.display = 'none';

      if (!res.ok) {
        /* no valid hand detected */
        aiEm.textContent  = '❌';
        aiTxt.textContent = 'No hand';
        const b = document.getElementById('banner');
        b.className = '';
        void b.offsetWidth;
        b.className   = 'banner err shake';
        b.textContent = '⚠️  No hand detected — try again!';
      } else {
        const { player, ai_name, ai_emoji, result } = await res.json();

        /* reveal AI choice */
        aiEm.className = '';
        void aiEm.offsetWidth;
        aiEm.className   = 'ai-em pop';
        aiEm.textContent  = ai_emoji;
        aiTxt.textContent = ai_name;

        /* result banner */
        const MAP = {
          WIN:  ['win',  '🎉  You WIN!'],
          LOSE: ['lose', '💀  You LOSE!'],
          DRAW: ['draw', '🤝  DRAW!'],
        };
        const [cls, text] = MAP[result] ?? ['idle', '?'];
        setBanner(cls, text);
        addScore(result);
      }

    } catch (_) {
      document.getElementById('ai-dots').style.display = 'none';
      setBanner('err', 'Connection error — try again!');
    }

    await sleep(1600);
    btn.disabled = false;
    busy = false;
  }
</script>

</body>
</html>
